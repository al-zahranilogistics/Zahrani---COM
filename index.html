<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الزهراني للحضور الذكي 2026</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --gold: #facc15; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; position: relative; }
        .header-vid { width: 100%; height: 180px; border-radius: 15px; object-fit: cover; margin-bottom: 15px; background: #000; border: 1px solid var(--gold); }
        .glass-card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; text-align: center; }
        button { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; }
        .btn-gold { background: var(--gold); color: #0f172a; }
        .btn-red { background: #ef4444; color: white; }
        .btn-green { background: #10b981; color: white; }
        .admin-tools { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px dashed var(--gold); }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; margin-top: 10px; }
        th, td { padding: 8px; border-bottom: 1px solid #334155; text-align: center; }
        th { color: var(--gold); }
        #camera { width: 100%; border-radius: 15px; background: #000; transform: scaleX(-1); margin-bottom: 10px; border: 2px solid var(--gold); }
        .img-preview { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 1px solid var(--gold); cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <video class="header-vid" autoplay muted loop playsinline>
        <source src="https://videotourl.com/videos/1774779789874-936d4d66-2e77-4040-99d1-0781811fa154.mp4" type="video/mp4">
    </video>

    <div id="loginSection" class="glass-card">
        <h2 style="text-align:center; margin-top:0;">🏢 نظام الحضور الذكي</h2>
        <input type="text" id="empID" placeholder="الرقم الوظيفي">
        <input type="password" id="loginPass" placeholder="كلمة المرور">
        <button class="btn-gold" onclick="smartLogin()">🚀 دخول</button>
    </div>

    <div id="employeePanel" style="display:none;" class="glass-card">
        <h3 style="text-align:center;">📸 تسجيل البصمة</h3>
        <video id="camera" autoplay muted playsinline></video>
        <div style="display: flex; gap: 10px;">
            <button class="btn-gold" style="flex:1" onclick="takeAction('in')">حضور ✅</button>
            <button class="btn-red" style="flex:1" onclick="takeAction('out')">انصراف 🚪</button>
        </div>
        <button style="background:none; color:#94a3b8; margin-top:10px;" onclick="location.reload()">تسجيل خروج</button>
    </div>

    <div id="adminPanel" style="display:none;" class="glass-card">
        <h3 style="text-align:center;">📊 لوحة المدير (2026)</h3>
        <div class="admin-tools">
            <h4 style="margin:0; color:var(--gold);">➕ إضافة موظف جديد</h4>
            <input type="text" id="newEmpID" placeholder="الرقم الوظيفي (مثلاً 033)">
            <input type="text" id="newEmpName" placeholder="الاسم (مثلاً رانجار)">
            <button class="btn-gold" onclick="addNewEmployee()">حفظ الموظف</button>
        </div>
        <button class="btn-green" style="margin-bottom: 10px;" onclick="exportToExcel()">📥 تصدير تقرير Excel</button>
        <div style="overflow-x:auto;">
            <table id="attendanceTable">
                <thead>
                    <tr><th>الموظف</th><th>الحالة</th><th>التاريخ والزمن</th><th>🖼️</th></tr>
                </thead>
                <tbody id="logsTable"></tbody>
            </table>
        </div>
        <button class="btn-red" style="margin-top:15px;" onclick="location.reload()">خروج</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyARsbHocLobpRG-LV7HeURMAatcYCkdkmc",
        authDomain: "zahrani-attendance.firebaseapp.com",
        projectId: "zahrani-attendance",
        storageBucket: "zahrani-attendance.appspot.com",
        messagingSenderId: "861962206748",
        appId: "1:861962206748:web:43500609b0d84d2b25e9d9"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    async function smartLogin() {
        const id = document.getElementById("empID").value.trim();
        const pass = document.getElementById("loginPass").value;
        const email = `${id}@alzahrani.com`;
        try {
            await auth.signInWithEmailAndPassword(email, pass);
            const doc = await db.collection("users").doc(auth.currentUser.uid).get();
            if(doc.exists) {
                document.getElementById("loginSection").style.display = "none";
                if(doc.data().role === "admin") {
                    document.getElementById("adminPanel").style.display = "block";
                    loadLogs();
                } else {
                    document.getElementById("employeePanel").style.display = "block";
                    startCam();
                }
            }
        } catch (e) { alert("خطأ في بيانات الدخول"); }
    }

    async function addNewEmployee() {
        const id = document.getElementById("newEmpID").value.trim();
        const name = document.getElementById("newEmpName").value.trim();
        if(!id || !name) return alert("أدخل البيانات كاملة");
        const email = `${id}@alzahrani.com`;
        const password = id.length >= 6 ? id : id.padEnd(6, "0");
        try {
            const tempApp = firebase.initializeApp(firebaseConfig, "App" + Math.random());
            const userCred = await tempApp.auth().createUserWithEmailAndPassword(email, password);
            await db.collection("users").doc(userCred.user.uid).set({ empID: id, name: name, role: "employee" });
            await tempApp.delete();
            alert(`✅ تم! الاسم: ${name} | كلمة المرور: ${password}`);
            document.getElementById("newEmpID").value = ""; document.getElementById("newEmpName").value = "";
        } catch (e) { alert("خطأ: " + e.message); }
    }

    async function startCam() {
        try { const s = await navigator.mediaDevices.getUserMedia({ video: true }); document.getElementById("camera").srcObject = s; }
        catch (e) { alert("يرجى السماح بالكاميرا"); }
    }

    async function takeAction(type) {
        const video = document.getElementById("camera");
        const canvas = document.createElement("canvas");
        canvas.width = 400; canvas.height = 300;
        canvas.getContext("2d").drawImage(video, 0, 0, 400, 300);
        const base64 = canvas.toDataURL("image/jpeg", 0.6).split(",")[1];
        
        alert("جاري رفع البصمة...");
        const fd = new FormData(); fd.append("image", base64);
        try {
            const res = await fetch("https://iimg.live/api/upload", {
                method: "POST",
                headers: { "Authorization": "Bearer pk_415f3da8d4902db59514e398010abb43" }, // مفتاحك الجديد
                body: fd
            });
            const data = await res.json();
            if(!data.url) throw new Error("فشل الرفع");
            const userDoc = await db.collection("users").doc(auth.currentUser.uid).get();
            await db.collection("attendance").add({
                name: userDoc.data().name,
                status: type === 'in' ? 'حضور ✅' : 'انصراف 🚪',
                img: data.url,
                time: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("✅ تم التسجيل بنجاح!");
        } catch (e) { alert("❌ خطأ في الرفع: تأكد من الإنترنت أو صلاحية المفتاح"); }
    }

    function loadLogs() {
        db.collection("attendance").orderBy("time", "desc").onSnapshot(snap => {
            const html = snap.docs.map(doc => {
                const d = doc.data();
                let fullTime = "...";
                if (d.time) {
                    const dt = d.time.toDate();
                    fullTime = `${dt.toISOString().split('T')[0]} ${dt.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit', hour12: true })}`;
                }
                return `<tr><td>${d.name}</td><td>${d.status}</td><td style="direction:ltr;">${fullTime}</td><td><img src="${d.img}" class="img-preview" onclick="window.open(this.src)"></td></tr>`;
            }).join('');
            document.getElementById("logsTable").innerHTML = html;
        });
    }

    function exportToExcel() {
        const table = document.getElementById("attendanceTable");
        const ws = XLSX.utils.table_to_sheet(table);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Attendance");
        XLSX.writeFile(wb, `Report_2026.xlsx`);
    }
</script>
</body>
</html>
