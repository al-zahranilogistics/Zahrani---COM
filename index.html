<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alzahrani Logistics - Smart Attendance</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #facc15; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --danger: #ef4444; --success: #10b981; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; min-height: 100vh; transition: 0.3s; }
        .container { width: 100%; max-width: 900px; margin: 0 auto; }
        .logo-oval { width: 150px; height: 85px; object-fit: contain; border-radius: 50% / 50%; border: 2px solid var(--gold); background: white; padding: 5px; margin: 0 auto 15px; display: block; box-shadow: 0 0 15px rgba(250, 204, 21, 0.4); }
        .header-vid { width: 100%; height: 160px; border-radius: 20px; object-fit: cover; margin-bottom: 15px; border: 1px solid var(--gold); }
        .glass-card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .btn { padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.9rem; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-blue { background: #3b82f6; color: white; }
        .btn-outline { background: rgba(255,255,255,0.05); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); }
        .lang-toggle { position: fixed; top: 20px; left: 20px; z-index: 1000; background: var(--gold); border-radius: 50px; padding: 8px 15px; cursor: pointer; color: black; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .table-container { overflow-x: auto; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: rgba(255,255,255,0.05); color: var(--gold); padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }
        #camera { width: 100%; max-width: 380px; border-radius: 20px; border: 3px solid var(--gold); transform: scaleX(-1); margin: 0 auto 15px; display: block; }
        .img-preview { width: 45px; height: 45px; border-radius: 8px; border: 1px solid var(--gold); cursor: pointer; }
    </style>
</head>
<body dir="rtl">

<div class="lang-toggle" onclick="toggleLanguage()"><i class="fas fa-language"></i> <span id="langBtnText">English</span></div>

<div class="container">
    <div class="header" style="text-align:center;">
        <img src="https://res.cloudinary.com/dzukfybwr/image/upload/v1774965392/PQ%D8%AD%D8%B6%D9%88%D8%B1_mrfvvb.png" class="logo-oval">
        <h2 id="mainTitle" style="color: var(--gold);">نظام الزهراني للبصمة الذكية</h2>
    </div>

    <div id="loginSection" class="glass-card" style="max-width: 400px; margin: 0 auto;">
        <video class="header-vid" autoplay muted loop playsinline><source src="https://videotourl.com/videos/1774779789874-936d4d66-2e77-4040-99d1-0781811fa154.mp4" type="video/mp4"></video>
        <h3 id="loginHeader" style="text-align: center;"><i class="fas fa-fingerprint"></i> دخول النظام</h3>
        <input type="text" id="empID" placeholder="الرقم الوظيفي" style="width:100%; padding:14px; margin-bottom:12px; border-radius:10px; background:#0f172a; color:white; border:1px solid #334155; box-sizing:border-box;">
        <button class="btn btn-gold" style="width:100%" onclick="smartLogin()"><i class="fas fa-sign-in-alt"></i> <span id="btnLoginText">دخول</span></button>
    </div>

    <div id="employeePanel" style="display:none;" class="glass-card">
        <h3 id="empPanelHeader" style="text-align:center;"><i class="fas fa-video"></i> بصمة الوجه لـ: <span id="currentUserName" style="color:var(--gold)"></span></h3>
        <video id="camera" autoplay muted playsinline></video>
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <button class="btn btn-gold" style="flex:1" onclick="takeAction('in')"><i class="fas fa-check-circle"></i> <span id="txtIn">إثبات حضور</span></button>
            <button class="btn btn-danger" style="flex:1" onclick="takeAction('out')"><i class="fas fa-door-open"></i> <span id="txtOut">تسجيل انصراف</span></button>
        </div>
        <button class="btn btn-outline" style="width:100%" onclick="location.reload()">
            <i class="fas fa-undo"></i> <span id="btnBackText">خروج وعودة للشاشة الرئيسية</span>
        </button>
    </div>

    <div id="adminPanel" style="display:none;">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <button class="btn btn-blue" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i> <span id="adminLogoutText">خروج</span></button>
            <button class="btn btn-gold" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> Excel</button>
        </div>

        <div class="glass-card">
            <h3><i class="fas fa-user-plus"></i> <span id="addEmpHeader">إضافة موظف</span></h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px;">
                <input type="text" id="newID" placeholder="الرقم الوظيفي" style="padding:12px; border-radius:10px; border:1px solid #334155; background:#0f172a; color:white;">
                <input type="text" id="newName" placeholder="اسم الموظف" style="padding:12px; border-radius:10px; border:1px solid #334155; background:#0f172a; color:white;">
            </div>
            <button class="btn btn-blue" style="width:100%;" onclick="addEmployee()"><i class="fas fa-save"></i> <span id="btnSaveEmpText">حفظ الموظف</span></button>
        </div>

        <div class="glass-card">
            <h3 id="staffListHeader"><i class="fas fa-users-cog"></i> إدارة الموظفين</h3>
            <div id="staffList" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
        </div>

        <div class="glass-card">
            <h3 id="logsHeader"><i class="fas fa-list"></i> سجل الحضور</h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr id="tableHead">
                            <th>الاسم</th><th>الحالة</th><th>التاريخ والوقت</th><th>📸</th><th>مسح</th>
                        </tr>
                    </thead>
                    <tbody id="logsTable"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyARsbHocLobpRG-LV7HeURMAatcYCkdkmc",
        projectId: "zahrani-attendance",
        appId: "1:861962206748:web:43500609b0d84d2b25e9d9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let currentUser = null;
    let currentLang = 'ar';

    // بيانات الترجمة
    const translations = {
        ar: {
            mainTitle: "نظام الزهراني للبصمة الذكية",
            loginHeader: "دخول النظام",
            empIDPlaceholder: "الرقم الوظيفي",
            btnLogin: "دخول",
            empPanelHeader: "بصمة الوجه لـ: ",
            txtIn: "إثبات حضور",
            txtOut: "تسجيل انصراف",
            btnBack: "خروج وعودة للشاشة الرئيسية",
            adminLogout: "خروج",
            addEmpHeader: "إضافة موظف",
            newNamePlaceholder: "اسم الموظف",
            btnSaveEmp: "حفظ الموظف",
            staffListHeader: "إدارة الموظفين",
            logsHeader: "سجل الحضور",
            thName: "الاسم", thStatus: "الحالة", thTime: "التاريخ والوقت", thAction: "مسح",
            langBtn: "English",
            msgSuccess: "تم بنجاح", msgError: "خطأ في الاتصال"
        },
        en: {
            mainTitle: "Alzahrani Smart Attendance System",
            loginHeader: "System Login",
            empIDPlaceholder: "Employee ID",
            btnLogin: "Login",
            empPanelHeader: "Face ID for: ",
            txtIn: "Clock In",
            txtOut: "Clock Out",
            btnBack: "Back to Home",
            adminLogout: "Logout",
            addEmpHeader: "Add Employee",
            newNamePlaceholder: "Employee Name",
            btnSaveEmp: "Save Employee",
            staffListHeader: "Staff Management",
            logsHeader: "Attendance Logs",
            thName: "Name", thStatus: "Status", thTime: "Date & Time", thAction: "Delete",
            langBtn: "عربي",
            msgSuccess: "Success", msgError: "Connection Error"
        }
    };

    function toggleLanguage() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        const t = translations[currentLang];
        
        // تغيير اتجاه الصفحة
        document.body.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        
        // تحديث النصوص
        document.getElementById("langBtnText").innerText = t.langBtn;
        document.getElementById("mainTitle").innerText = t.mainTitle;
        document.getElementById("loginHeader").innerHTML = `<i class="fas fa-fingerprint"></i> ${t.loginHeader}`;
        document.getElementById("empID").placeholder = t.empIDPlaceholder;
        document.getElementById("btnLoginText").innerText = t.btnLogin;
        document.getElementById("empPanelHeader").innerHTML = `<i class="fas fa-video"></i> ${t.empPanelHeader} <span id="currentUserName" style="color:var(--gold)">${currentUser ? currentUser.name : ""}</span>`;
        document.getElementById("txtIn").innerText = t.txtIn;
        document.getElementById("txtOut").innerText = t.txtOut;
        document.getElementById("btnBackText").innerText = t.btnBack;
        document.getElementById("adminLogoutText").innerText = t.adminLogout;
        document.getElementById("addEmpHeader").innerHTML = `<i class="fas fa-user-plus"></i> ${t.addEmpHeader}`;
        document.getElementById("newID").placeholder = t.empIDPlaceholder;
        document.getElementById("newName").placeholder = t.newNamePlaceholder;
        document.getElementById("btnSaveEmpText").innerText = t.btnSaveEmp;
        document.getElementById("staffListHeader").innerHTML = `<i class="fas fa-users-cog"></i> ${t.staffListHeader}`;
        document.getElementById("logsHeader").innerHTML = `<i class="fas fa-list"></i> ${t.logsHeader}`;
        
        // تحديث عناوين الجدول
        document.getElementById("tableHead").innerHTML = `<th>${t.thName}</th><th>${t.thStatus}</th><th>${t.thTime}</th><th>📸</th><th>${t.thAction}</th>`;
        
        if (currentUser && currentUser.role === "admin") loadAdminData();
    }

    async function smartLogin() {
        const idInput = document.getElementById("empID").value.trim();
        if(!idInput) return;
        const q = await db.collection("users").where("empID", "==", idInput).get();
        if (q.empty) return alert(currentLang === 'ar' ? "الرقم الوظيفي غير موجود" : "ID not found");
        
        q.forEach(doc => { currentUser = doc.data(); currentUser.id = doc.id; });
        document.getElementById("loginSection").style.display = "none";
        
        if(currentUser.role === "admin") {
            document.getElementById("adminPanel").style.display = "block";
            loadAdminData();
        } else {
            document.getElementById("employeePanel").style.display = "block";
            document.getElementById("currentUserName").innerText = currentUser.name;
            startCam();
        }
    }

    async function startCam() {
        const s = await navigator.mediaDevices.getUserMedia({ video: true });
        document.getElementById("camera").srcObject = s;
    }

    async function takeAction(type) {
        const video = document.getElementById("camera");
        const canvas = document.createElement("canvas");
        canvas.width = 280; canvas.height = 210; 
        canvas.getContext("2d").drawImage(video, 0, 0, 280, 210);
        const base64 = canvas.toDataURL("image/jpeg", 0.25); 

        const fd = new FormData();
        fd.append("file", base64);
        fd.append("upload_preset", "zahrani_private");

        try {
            const res = await fetch(`https://api.cloudinary.com/v1_1/dzukfybwr/image/upload`, { method: "POST", body: fd });
            const data = await res.json();
            await db.collection("attendance").add({
                name: currentUser.name,
                status: type === 'in' ? (currentLang === 'ar' ? 'حضور ✅' : 'Clock In ✅') : (currentLang === 'ar' ? 'انصراف 🚪' : 'Clock Out 🚪'),
                img: data.secure_url,
                time: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert(translations[currentLang].msgSuccess);
            if(type === 'out') location.reload();
        } catch (e) { alert(translations[currentLang].msgError); }
    }

    async function addEmployee() {
        const id = document.getElementById("newID").value.trim();
        const name = document.getElementById("newName").value.trim();
        if(!id || !name) return;
        await db.collection("users").add({ empID: id, name: name, role: "employee" });
        loadAdminData();
    }

    async function deleteEmployee(id) {
        if(confirm(currentLang === 'ar' ? "حذف الموظف؟" : "Delete Employee?")) { 
            await db.collection("users").doc(id).delete(); loadAdminData(); 
        }
    }

    function loadAdminData() {
        db.collection("users").where("role", "==", "employee").onSnapshot(snap => {
            let h = "";
            snap.forEach(doc => {
                h += `<div class="btn-outline" style="padding:10px; border-radius:10px; display:flex; justify-content:space-between; align-items:center; color:white;">
                    <span>${doc.data().name} (${doc.data().empID})</span>
                    <i class="fas fa-trash-alt" onclick="deleteEmployee('${doc.id}')" style="cursor:pointer; color:var(--danger)"></i>
                </div>`;
            });
            document.getElementById("staffList").innerHTML = h;
        });

        db.collection("attendance").orderBy("time", "desc").onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => {
                const d = doc.data();
                const t = d.time ? d.time.toDate().toLocaleString(currentLang === 'ar' ? 'ar-SA' : 'en-US') : "...";
                html += `<tr><td><b>${d.name}</b></td><td>${d.status}</td><td style="direction:ltr;">${t}</td>
                <td><img src="${d.img}" class="img-preview" onclick="window.open(this.src)"></td>
                <td><i class="fas fa-trash" onclick="deleteLog('${doc.id}')" style="color:var(--danger); cursor:pointer;"></i></td></tr>`;
            });
            document.getElementById("logsTable").innerHTML = html;
        });
    }

    async function deleteLog(id) {
        if(confirm(currentLang === 'ar' ? "مسح السجل؟" : "Delete Record?")) await db.collection("attendance").doc(id).delete();
    }

    function exportToExcel() {
        const ws = XLSX.utils.table_to_sheet(document.querySelector("table"));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Logs");
        XLSX.writeFile(wb, `Zahrani_Logs.xlsx`);
    }
</script>
</body>
</html>
