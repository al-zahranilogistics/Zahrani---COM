<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alzahrani Smart Attendance 2026</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #facc15; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --danger: #ef4444; --success: #10b981; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; min-height: 100vh; }
        .container { width: 100%; max-width: 900px; margin: 0 auto; }
        .logo-oval { width: 150px; height: 85px; object-fit: contain; border-radius: 50% / 50%; border: 2px solid var(--gold); background: white; padding: 5px; margin: 0 auto 15px; display: block; box-shadow: 0 0 15px rgba(250, 204, 21, 0.4); }
        .header-vid { width: 100%; height: 160px; border-radius: 20px; object-fit: cover; margin-bottom: 15px; border: 1px solid var(--gold); }
        .glass-card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .btn { padding: 12px 18px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-blue { background: #3b82f6; color: white; }
        .lang-toggle { position: fixed; top: 20px; left: 20px; z-index: 1000; background: var(--gold); border-radius: 50px; padding: 8px 15px; cursor: pointer; color: black; font-weight: bold; }
        .table-container { overflow-x: auto; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 650px; }
        th { background: rgba(255,255,255,0.05); color: var(--gold); padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; font-size: 0.85rem; }
        #camera { width: 100%; max-width: 380px; border-radius: 20px; border: 3px solid var(--gold); transform: scaleX(-1); margin: 0 auto 15px; display: block; }
        .img-preview { width: 50px; height: 50px; border-radius: 10px; border: 1px solid var(--gold); cursor: pointer; }
    </style>
</head>
<body dir="rtl">

<div class="lang-toggle" onclick="toggleLanguage()"><i class="fas fa-language"></i> <span id="langText">English</span></div>

<div class="container">
    <div class="header" style="text-align:center;">
        <img src="https://res.cloudinary.com/dzukfybwr/image/upload/v1774965392/PQ%D8%AD%D8%B6%D9%88%D8%B1_mrfvvb.png" class="logo-oval">
        <h2 id="mainTitle" style="color: var(--gold);">نظام الزهراني للبصمة الذكية</h2>
    </div>

    <div id="loginSection" class="glass-card" style="max-width: 400px; margin: 0 auto;">
        <video class="header-vid" autoplay muted loop playsinline><source src="https://videotourl.com/videos/1774779789874-936d4d66-2e77-4040-99d1-0781811fa154.mp4" type="video/mp4"></video>
        <h3 id="loginHeader" style="text-align: center;"><i class="fas fa-fingerprint"></i> دخول النظام</h3>
        <input type="text" id="empID" placeholder="الرقم الوظيفي" style="width:100%; padding:14px; margin-bottom:10px; border-radius:10px; background:#0f172a; color:white; border:1px solid #334155; box-sizing:border-box;">
        <input type="password" id="loginPass" placeholder="كلمة المرور (اختياري حالياً)" style="width:100%; padding:14px; margin-bottom:15px; border-radius:10px; background:#0f172a; color:white; border:1px solid #334155; box-sizing:border-box;">
        <button class="btn btn-gold" style="width:100%" onclick="smartLogin()"><i class="fas fa-sign-in-alt"></i> <span id="btnLogin">دخول</span></button>
    </div>

    <div id="employeePanel" style="display:none;" class="glass-card">
        <h3 id="empPanelHeader" style="text-align:center;"><i class="fas fa-camera"></i> تسجيل البصمة لـ: <span id="currentUserName" style="color:var(--gold)"></span></h3>
        <video id="camera" autoplay muted playsinline></video>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-gold" style="flex:1" onclick="takeAction('in')"><i class="fas fa-check-circle"></i> <span id="txtIn">حضور</span></button>
            <button class="btn btn-danger" style="flex:1" onclick="takeAction('out')"><i class="fas fa-door-open"></i> <span id="txtOut">انصراف</span></button>
        </div>
        <button class="btn" style="width:100%; margin-top:15px; background:rgba(255,255,255,0.05); color:white;" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i> <span id="btnBack">خروج</span></button>
    </div>

    <div id="adminPanel" style="display:none;">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <button class="btn btn-blue" onclick="location.reload()"><i class="fas fa-arrow-right"></i> <span id="adminBack">عودة / خروج</span></button>
            <button class="btn btn-gold" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> Excel</button>
        </div>

        <div class="glass-card">
            <h3><i class="fas fa-history"></i> <span id="logsTitle">سجل الحضور الموحد</span></h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th id="thName">الاسم</th><th id="thStatus">الحالة</th><th id="thTime">التاريخ والوقت</th><th>📸</th><th id="thAction">مسح</th></tr>
                    </thead>
                    <tbody id="logsTable"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // إعدادات Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyARsbHocLobpRG-LV7HeURMAatcYCkdkmc",
        projectId: "zahrani-attendance",
        appId: "1:861962206748:web:43500609b0d84d2b25e9d9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let currentUser = null;
    let currentLang = 'ar';

    // --- نظام الدخول المباشر بالرقم الوظيفي (حل مشكلة الدخول) ---
    async function smartLogin() {
        const idInput = document.getElementById("empID").value.trim();
        if(!idInput) return alert("يرجى إدخال الرقم الوظيفي");

        try {
            // البحث عن الموظف في Firestore بناءً على empID
            const q = await db.collection("users").where("empID", "==", idInput).get();
            
            if (q.empty) {
                alert("عذراً، الرقم الوظيفي غير مسجل في النظام");
                return;
            }

            q.forEach(doc => {
                currentUser = doc.data();
                currentUser.id = doc.id;
            });

            document.getElementById("loginSection").style.display = "none";
            
            if(currentUser.role === "admin") {
                document.getElementById("adminPanel").style.display = "block";
                loadAdminLogs();
            } else {
                document.getElementById("employeePanel").style.display = "block";
                document.getElementById("currentUserName").innerText = currentUser.name;
                startCam();
            }
        } catch (e) { alert("حدث خطأ في الاتصال"); }
    }

    async function startCam() {
        const s = await navigator.mediaDevices.getUserMedia({ video: true });
        document.getElementById("camera").srcObject = s;
    }

    // --- تسريع التقاط الصور والرفع ---
    async function takeAction(type) {
        const video = document.getElementById("camera");
        const canvas = document.createElement("canvas");
        canvas.width = 300; canvas.height = 225; // تقليل الحجم للسرعة القصوى
        canvas.getContext("2d").drawImage(video, 0, 0, 300, 225);
        const base64 = canvas.toDataURL("image/jpeg", 0.3); // ضغط عالي جداً لتسريع الرفع

        const fd = new FormData();
        fd.append("file", base64);
        fd.append("upload_preset", "zahrani_private");

        try {
            const res = await fetch(`https://api.cloudinary.com/v1_1/dzukfybwr/image/upload`, { method: "POST", body: fd });
            const data = await res.json();

            await db.collection("attendance").add({
                name: currentUser.name,
                empID: currentUser.empID,
                status: type === 'in' ? 'حضور ✅' : 'انصراف 🚪',
                img: data.secure_url,
                time: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("تم التسجيل بنجاح!");
            location.reload();
        } catch (e) { alert("فشل في الرفع"); }
    }

    // --- تحميل السجلات وتفعيل زر المسح ---
    function loadAdminLogs() {
        db.collection("attendance").orderBy("time", "desc").onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => {
                const d = doc.data();
                const t = d.time ? d.time.toDate().toLocaleString('ar-SA') : "...";
                html += `<tr>
                    <td><b>${d.name}</b></td>
                    <td><span style="color:${d.status.includes('حضور') ? 'var(--success)' : 'var(--danger)'}">${d.status}</span></td>
                    <td style="direction:ltr;">${t}</td>
                    <td><img src="${d.img}" class="img-preview" onclick="window.open(this.src)"></td>
                    <td><button class="btn btn-danger" onclick="deleteLog('${doc.id}')"><i class="fas fa-trash"></i></button></td>
                </tr>`;
            });
            document.getElementById("logsTable").innerHTML = html;
        });
    }

    async function deleteLog(id) {
        if(confirm("هل أنت متأكد من مسح هذا الإجراء؟")) {
            try {
                await db.collection("attendance").doc(id).delete();
            } catch(e) { alert("فشل الحذف"); }
        }
    }

    // --- نظام اللغات ---
    function toggleLanguage() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        document.body.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        document.getElementById("langText").innerText = currentLang === 'ar' ? "English" : "عربي";
        // يمكن إضافة ترجمة بقية العناصر هنا كما في النسخة السابقة
    }

    function exportToExcel() {
        const ws = XLSX.utils.table_to_sheet(document.querySelector("table"));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Attendance");
        XLSX.writeFile(wb, `Alzahrani_Logs.xlsx`);
    }
</script>
</body>
</html>
