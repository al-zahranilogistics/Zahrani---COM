<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الزهراني للحضور الذكي v2.5</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #facc15; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --danger: #ef4444; --success: #10b981; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 850px; }
        .glass-card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .header { text-align: center; margin-bottom: 20px; }
        .header img { width: 100px; filter: drop-shadow(0 0 8px var(--gold)); }
        
        /* الجداول */
        .table-container { overflow-x: auto; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background: rgba(255,255,255,0.05); color: var(--gold); padding: 12px; font-size: 0.85rem; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }

        /* الأزرار */
        .btn { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-danger { background: var(--danger); color: white; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }

        /* مدخلات البيانات */
        .input-group { background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .input-group input { background: transparent; border: none; color: white; outline: none; width: 100%; }

        /* الكاميرا والصور */
        #camera { width: 100%; max-width: 350px; border-radius: 15px; border: 2px solid var(--gold); transform: scaleX(-1); margin: 0 auto 15px; display: block; }
        .img-preview { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; border: 1px solid var(--gold); cursor: pointer; }
        
        #imgModal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        #imgModal img { max-width: 90%; max-height: 80%; border-radius: 10px; border: 2px solid var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://i.ibb.co/X7Wq1v6/Alzahrani-Logo.png" alt="الزهراني">
        <h2 style="color: var(--gold); margin: 5px 0;">نظام البصمة الذكي 2026</h2>
    </div>

    <div id="loginSection" class="glass-card" style="max-width: 350px; margin: 0 auto;">
        <h3 style="text-align: center;">دخول الموظفين</h3>
        <div class="input-group"><i class="fas fa-id-card"></i><input type="text" id="empID" placeholder="الرقم الوظيفي"></div>
        <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="loginPass" placeholder="كلمة المرور"></div>
        <button class="btn btn-gold" style="width:100%" onclick="smartLogin()">دخول</button>
    </div>

    <div id="employeePanel" style="display:none;" class="glass-card">
        <h3 style="text-align:center;">بصمة الوجه الحية</h3>
        <video id="camera" autoplay muted playsinline></video>
        <div id="actionButtons" style="display: flex; gap: 10px;">
            <button id="btnIn" class="btn btn-gold" style="flex:1" onclick="takeAction('in')">إثبات حضور ✅</button>
            <button id="btnOut" class="btn btn-danger" style="flex:1" onclick="takeAction('out')">تسجيل انصراف 🚪</button>
        </div>
        <button class="btn" style="background:transparent; color:#94a3b8; width:100%; margin-top:10px;" onclick="location.reload()">خروج</button>
    </div>

    <div id="adminPanel" style="display:none;">
        <div class="glass-card">
            <h3>إحصائيات اليوم</h3>
            <div style="display:flex; justify-content:space-around; text-align:center;">
                <div><h2 id="countIn" style="color:var(--success)">0</h2><p>حضور</p></div>
                <div><h2 id="countOut" style="color:var(--danger)">0</h2><p>انصراف</p></div>
            </div>
            <button class="btn btn-gold" style="width:100%; margin-top:10px;" onclick="exportToExcel()">تحميل تقرير Excel</button>
        </div>

        <div class="glass-card">
            <h3>سجل الحضور</h3>
            <div class="table-container">
                <table>
                    <thead><tr><th>الموظف</th><th>الحالة</th><th>الوقت</th><th>الصورة</th></tr></thead>
                    <tbody id="logsTable"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="imgModal" onclick="this.style.display='none'"><img id="modalImg"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyARsbHocLobpRG-LV7HeURMAatcYCkdkmc",
        authDomain: "zahrani-attendance.firebaseapp.com",
        projectId: "zahrani-attendance",
        storageBucket: "zahrani-attendance.appspot.com",
        messagingSenderId: "861962206748",
        appId: "1:861962206748:web:43500609b0d84d2b25e9d9"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const cloudName = "dzukfybwr";
    const uploadPreset = "zahrani_private";

    async function smartLogin() {
        const id = document.getElementById("empID").value.trim();
        const pass = document.getElementById("loginPass").value;
        try {
            const userCred = await auth.signInWithEmailAndPassword(`${id}@alzahrani.com`, pass);
            const doc = await db.collection("users").doc(userCred.user.uid).get();
            document.getElementById("loginSection").style.display = "none";
            if(doc.data().role === "admin") {
                document.getElementById("adminPanel").style.display = "block";
                loadAdminLogs();
            } else {
                document.getElementById("employeePanel").style.display = "block";
                startCam();
                checkDailyLimit(userCred.user.uid);
            }
        } catch (e) { alert("بيانات غير صحيحة"); }
    }

    async function startCam() {
        const s = await navigator.mediaDevices.getUserMedia({ video: true });
        document.getElementById("camera").srcObject = s;
    }

    // فحص سجل اليوم لمنع التكرار
    async function checkDailyLimit(uid) {
        const start = new Date(); start.setHours(0,0,0,0);
        const snap = await db.collection("attendance").where("uid","==",uid).where("time",">=",start).get();
        
        snap.forEach(doc => {
            if(doc.data().status.includes("حضور")) {
                document.getElementById("btnIn").disabled = true;
                document.getElementById("btnIn").innerText = "تم الحضور";
            }
            if(doc.data().status.includes("انصراف")) {
                document.getElementById("btnOut").disabled = true;
                document.getElementById("btnOut").innerText = "تم الانصراف";
            }
        });
    }

    async function takeAction(type) {
        const video = document.getElementById("camera");
        const canvas = document.createElement("canvas");
        // تصغير الحجم والضغط لسرعة الرفع
        canvas.width = 320; canvas.height = 240;
        canvas.getContext("2d").drawImage(video, 0, 0, 320, 240);
        const base64 = canvas.toDataURL("image/jpeg", 0.4); 

        alert("جاري التحقق السريع...");
        const fd = new FormData();
        fd.append("file", base64);
        fd.append("upload_preset", uploadPreset);

        try {
            const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, { method: "POST", body: fd });
            const data = await res.json();
            
            const user = auth.currentUser;
            const userDoc = await db.collection("users").doc(user.uid).get();

            await db.collection("attendance").add({
                uid: user.uid,
                name: userDoc.data().name,
                status: type === 'in' ? 'حضور ✅' : 'انصراف 🚪',
                img: data.secure_url || "",
                time: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("✅ تم التسجيل بنجاح");
            location.reload();
        } catch (e) { alert("خطأ في الاتصال"); }
    }

    function loadAdminLogs() {
        db.collection("attendance").orderBy("time", "desc").onSnapshot(snap => {
            let html = "", ins = 0, outs = 0;
            snap.forEach(doc => {
                const d = doc.data();
                if(d.status.includes("حضور")) ins++; else outs++;
                const t = d.time ? d.time.toDate().toLocaleString('ar-SA') : "...";
                html += `<tr><td>${d.name}</td><td>${d.status}</td><td style="font-size:0.75rem">${t}</td>
                <td><img src="${d.img}" class="img-preview" onclick="showImg('${d.img}')"></td></tr>`;
            });
            document.getElementById("logsTable").innerHTML = html;
            document.getElementById("countIn").innerText = ins;
            document.getElementById("countOut").innerText = outs;
        });
    }

    function showImg(s) { document.getElementById("modalImg").src = s; document.getElementById("imgModal").style.display = "flex"; }

    function exportToExcel() {
        const ws = XLSX.utils.table_to_sheet(document.querySelector("table"));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Attendance");
        XLSX.writeFile(wb, `Alzahrani_Report.xlsx`);
    }
</script>
</body>
</html>
